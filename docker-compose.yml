version: '3.8'

services:
  task-manager-app:
    build:
      context: .
      dockerfile: ./dockerfile
    ports:
      - "80:8080"
    depends_on:
      - mariadb
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: task-manager-app
      DB_USERNAME: laravel-user
      DB_PASSWORD: Pass@@29
    networks:
      - my-network  

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: Pass@@29
      MARIADB_DATABASE: task-manager-app
      MARIADB_USER: laravel-user
      MARIADB_PASSWORD: Pass@@29
    ports:
      - "9906:3306"
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
