version: '3.8'

services:  
  task-manager-app:
    build:
      context: .
      dockerfile: ./dockerfile
    image: task-manager-app
    ports:
      - 80:8080
    depends_on:
      - db


  db:
    image: mysql:8.0.13
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: task-manager-app
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password    
    ports:
      - "33006:3306"  