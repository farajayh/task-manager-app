version: '3.8'

services:  
  task-manager-app:
    build:
      context: .
      dockerfile: ./dockerfile
    ports:
      - 80:8080
    depends_on:
      - db


  db:
    build:
      context: .
      dockerfile: ./db.dockerfile
    environment:
      MYSQL_DATABASE: task-manager-db
      MYSQL_USERNAME: laravel
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password