version: '3.8'

services:  
  task-manager-app:
    build:
      context: .
      dockerfile: ./dockerfile
    image: task-manager-app
    ports:
      - 80:8080
    depends_on:
      - db


  db:
    image: mariadb:latest
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: Pass@@29
      MARIADB_DATABASE: task-manager-app
      MARIADB_USER: laravel-uer
      MARIADB_PASSWORD: Pass@@29
    ports:
      - 9906:3306